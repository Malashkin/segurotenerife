<!doctype html>
<!--
  HTML-оболочка web-приложения (лендинг + чат-подбор).
  Подключает шрифты Sora/Inter (как в прототипе) и точку монтирования React.
  Контент рендерится в #root из src/main.tsx.

  SEO/GEO: базовые мета (title/description), Open Graph + Twitter cards для
  красивых превью при шеринге в Telegram/WhatsApp-чатах экспатов, canonical,
  favicon, theme-color и JSON-LD (Organization + WebSite). Стартовый lang="ru"
  как у основной аудитории; реальный язык проставляет i18n в <html lang> по
  выбору/браузеру (см. libs/shared/i18n/init.ts). ВАЖНО: полноценный мультиязычный
  SEO (hreflang + FAQPage-разметка) требует отдельных URL по языкам и пререндера —
  это вынесено в отдельную задачу (docs/seo).
-->
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Seguro Tenerife — подбор страховки на Тенерифе</title>
    <meta
      name="description"
      content="Независимый мультиязычный сервис подбора страховки на Тенерифе: медицинская для визы и ВНЖ, семейная, стоматология и другое. Бесплатно, без обязательств, на вашем языке."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://segurotenerife.com/" />

    <!-- hreflang-альтернативы (одинаковы на всех языковых версиях). RU — на `/`
         (и x-default), остальные — в подпапках. Файлы по локалям генерирует
         scripts/seo-prerender.mjs после сборки. -->
    <link rel="alternate" hreflang="ru" href="https://segurotenerife.com/" />
    <link rel="alternate" hreflang="es" href="https://segurotenerife.com/es/" />
    <link rel="alternate" hreflang="uk" href="https://segurotenerife.com/uk/" />
    <link rel="alternate" hreflang="en" href="https://segurotenerife.com/en/" />
    <link rel="alternate" hreflang="x-default" href="https://segurotenerife.com/" />

    <!-- Favicon / иконки -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0d9488" />

    <!-- Open Graph (Facebook, Telegram, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Seguro Tenerife" />
    <meta property="og:title" content="Seguro Tenerife — подбор страховки на Тенерифе" />
    <meta
      property="og:description"
      content="Ответьте на пару вопросов — менеджер подберёт полис под вашу ситуацию и напишет в удобный мессенджер. Бесплатно и без обязательств."
    />
    <meta property="og:url" content="https://segurotenerife.com/" />
    <meta property="og:image" content="https://segurotenerife.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="uk_UA" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Seguro Tenerife — подбор страховки на Тенерифе" />
    <meta
      name="twitter:description"
      content="Подбор страховки под вашу ситуацию на Тенерифе. Бесплатно, без обязательств, на вашем языке."
    />
    <meta name="twitter:image" content="https://segurotenerife.com/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD: организация + сайт (стабильные факты, без привязки к языку) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://segurotenerife.com/#org",
            "name": "Seguro Tenerife",
            "url": "https://segurotenerife.com/",
            "logo": "https://segurotenerife.com/favicon.svg",
            "areaServed": { "@type": "Place", "name": "Tenerife, Canary Islands, Spain" },
            "knowsLanguage": ["ru", "uk", "es", "en"],
            "description": "Независимый мультиязычный сервис подбора страховки на Тенерифе."
          },
          {
            "@type": "WebSite",
            "@id": "https://segurotenerife.com/#website",
            "url": "https://segurotenerife.com/",
            "name": "Seguro Tenerife",
            "publisher": { "@id": "https://segurotenerife.com/#org" },
            "inLanguage": ["ru", "uk", "es", "en"]
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

# pnpm workspace definition.
#
# Каждое приложение (apps/*) и каждая FSD-библиотека (libs/**) — это отдельный
# workspace-пакет. Так мы получаем изоляцию слоёв FSD и независимую подключаемость:
# приложение тянет в бандл только те библиотеки, которые реально импортирует.
#
# Почему pnpm-workspaces, а не Nx: Nx-генератор в этом окружении ненадёжен
# (интерактивные промпты / сеть), а рабочий монорепо важнее. Структура полностью
# совместима с FSD и при желании поверх неё можно добавить Nx позже.
packages:
  - 'apps/*'
  - 'libs/shared/*'
  - 'libs/entities'
  - 'libs/features'
  - 'libs/widgets'
  - 'libs/pages'

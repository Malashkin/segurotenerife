services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seguro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seguro}
      POSTGRES_DB: ${POSTGRES_DB:-seguro}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seguro}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-seguro}:${POSTGRES_PASSWORD:-seguro}@db:5432/${POSTGRES_DB:-seguro}
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      MANAGER_PASSWORD_HASH: ${MANAGER_PASSWORD_HASH:?set MANAGER_PASSWORD_HASH (cargo run --bin hash_password -- <pass>)}
      ACCESS_TTL_MIN: ${ACCESS_TTL_MIN:-30}
      REFRESH_TTL_DAYS: ${REFRESH_TTL_DAYS:-7}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-60}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata: {}

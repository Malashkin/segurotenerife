services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seguro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seguro}
      POSTGRES_DB: ${POSTGRES_DB:-seguro}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seguro}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-seguro}:${POSTGRES_PASSWORD:-seguro}@db:5432/${POSTGRES_DB:-seguro}
      PORT: "8080"
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-dev-token-change-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-60}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata: {}
